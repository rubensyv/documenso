name: Deploy Documenso

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run Prisma database migrations'
        type: boolean
        default: false

env:
  GCP_PROJECT_ID: heimwatt-app-ffe6c
  GCP_REGION: europe-west3
  REGISTRY: europe-west3-docker.pkg.dev
  IMAGE_NAME: europe-west3-docker.pkg.dev/heimwatt-app-ffe6c/heimwatt/documenso
  SERVICE_NAME: documenso

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_PRODUCTION }}
          service_account: github-actions@heimwatt-app-ffe6c.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Determine image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:production
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Prisma migrations
        if: inputs.run_migrations == true
        run: |
          gcloud run jobs execute documenso-migrate \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --wait

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Smoke test
        run: |
          URL="https://esign.heim-watt.de/api/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            WAIT=$((i * 3))
            echo "Attempt $i: status=$STATUS, waiting ${WAIT}s..."
            sleep $WAIT
          done
          echo "Health check failed after 10 attempts"
          exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: failure()
    steps:
      - name: Send Teams notification
        run: |
          curl -H "Content-Type: application/json" -d '{
            "text": "Documenso deployment failed! Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' "${{ secrets.TEAMS_WEBHOOK_URL }}"
